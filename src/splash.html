<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Loading…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* ────────── Card ────────── */
    .splash {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 28px 40px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 25% 15%, rgba(60, 100, 160, 0.18), transparent 55%),
        radial-gradient(circle at 80% 85%, rgba(80, 130, 200, 0.10), transparent 50%),
        linear-gradient(160deg, #0d1018 0%, #161a26 60%, #0a0d14 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-top-color: rgba(255, 255, 255, 0.10);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 -1px 0 rgba(0, 0, 0, 0.40),
        0 30px 60px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      animation: card-in 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.1);
    }

    @keyframes card-in {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1.00); }
    }

    /* ────────── Aurora / texture ────────── */
    .splash::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 100%, rgba(40, 90, 150, 0.18), transparent 55%),
        radial-gradient(ellipse at 90% 10%, rgba(100, 150, 220, 0.10), transparent 50%);
      pointer-events: none;
      opacity: 0.9;
    }

    .splash::after {
      /* Slow drifting noise — gives the card faint life */
      content: '';
      position: absolute;
      inset: -10%;
      background:
        repeating-linear-gradient(115deg,
          rgba(255, 255, 255, 0.012) 0px,
          rgba(255, 255, 255, 0.012) 1px,
          transparent 1px,
          transparent 4px);
      mix-blend-mode: screen;
      animation: drift 12s linear infinite;
      pointer-events: none;
      opacity: 0.6;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(-40px, 30px); }
    }

    /* ────────── Logo ────────── */
    .logo-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 36px;
    }

    .logo-glow {
      position: absolute;
      inset: -25%;
      background: radial-gradient(circle,
        rgba(80, 150, 230, 0.45) 0%,
        rgba(80, 150, 230, 0.15) 35%,
        transparent 65%);
      filter: blur(18px);
      opacity: 0;
      transform: scale(0.85);
      animation:
        glow-in 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.25s,
        glow-pulse 2.8s ease-in-out 1.45s infinite;
    }

    @keyframes glow-in {
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 1.0; }
    }

    /* Base logo (dim, desaturated, acts as a silhouette) */
    .logo-base {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: grayscale(100%) brightness(0.30) contrast(0.85);
      opacity: 0.55;
    }

    /* Filled overlay — revealed bottom-up by clip-path */
    .logo-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      clip-path: inset(100% 0 0 0);
      filter: drop-shadow(0 6px 20px rgba(60, 130, 220, 0.45))
              drop-shadow(0 0 18px rgba(100, 170, 240, 0.25));
      animation: fill-up 2.4s cubic-bezier(0.55, 0.1, 0.25, 1) forwards 0.35s;
    }

    @keyframes fill-up {
      0%   { clip-path: inset(100% 0 0 0); }
      100% { clip-path: inset(0    0 0 0); }
    }

    /* Bright sweeping line that follows the fill */
    .logo-sweep {
      position: absolute;
      left: -6%;
      right: -6%;
      bottom: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(140, 200, 255, 0.0)  10%,
        rgba(180, 220, 255, 0.95) 50%,
        rgba(140, 200, 255, 0.0)  90%,
        transparent 100%);
      box-shadow:
        0 0 12px rgba(140, 200, 255, 0.70),
        0 0 24px rgba(100, 170, 240, 0.40);
      filter: blur(0.6px);
      opacity: 0;
      animation: sweep-up 2.4s cubic-bezier(0.55, 0.1, 0.25, 1) forwards 0.35s;
    }

    @keyframes sweep-up {
      0%   { bottom: 0%;   opacity: 0; }
      8%   {               opacity: 1; }
      92%  {               opacity: 1; }
      100% { bottom: 100%; opacity: 0; }
    }

    /* ────────── Title + subtitle ────────── */
    .title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
      margin-bottom: 8px;
      text-align: center;
      opacity: 0;
      animation: text-in 0.6s ease forwards 1.4s;
    }

    .subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.5;
      max-width: 260px;
      opacity: 0;
      animation: text-in 0.6s ease forwards 1.7s;
    }

    @keyframes text-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ────────── Bottom progress bar ────────── */
    .progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .progress::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,
        rgba(80, 140, 220, 0.40),
        rgba(140, 200, 255, 0.95),
        rgba(80, 140, 220, 0.40));
      box-shadow: 0 0 10px rgba(140, 200, 255, 0.60);
      animation: bar-fill 2.85s cubic-bezier(0.35, 0.0, 0.65, 1) forwards 0.15s;
    }

    @keyframes bar-fill {
      0%   { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img class="logo-base" src="../assets/DP_LOGO.png" alt="" draggable="false">
      <img class="logo-fill" src="../assets/DP_LOGO.png" alt="" draggable="false">
      <div class="logo-sweep"></div>
    </div>

    <div class="title">Раді Вас знову бачити!</div>
    <div class="subtitle">Зачекайте будь ласка, відбувається<br>завантаження лаунчеру…</div>

    <div class="progress"></div>
  </div>
</body>
</html>
